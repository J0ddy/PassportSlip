        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .thermal-dot-pattern {
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-base min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-bg-primary flex justify-between items-center w-full px-space-4 h-16 border-b border-border-subtle fixed top-0 z-50">
<div class="flex items-center gap-space-2">
<span class="material-symbols-outlined text-fg-primary">menu</span>
<h1 class="font-h3 text-[1.5rem] tracking-tight uppercase text-fg-primary">VERIFY DETAILS</h1>
</div>
<span class="material-symbols-outlined text-fg-primary">print_connect</span>
</header>
<main class="flex-grow pt-24 pb-32 px-space-4 max-w-2xl mx-auto w-full">
<!-- Content Area -->
<section class="space-y-space-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-space-5">
<!-- Form Inputs -->
<div class="space-y-space-4 col-span-1 md:col-span-2">
<div class="group border-b border-border-default pb-space-2 transition-colors focus-within:border-border-strong">
<label class="block font-label-caps text-label-caps uppercase text-fg-tertiary mb-1">Passenger Name</label>
<input class="w-full bg-transparent border-none p-0 font-h3 text-[1.25rem] text-fg-primary focus:ring-0" type="text" value="ALEXANDER VANDEROHE"/>
</div>
<div class="grid grid-cols-2 gap-space-5">
<div class="group border-b border-border-default pb-space-2 transition-colors focus-within:border-border-strong">
<label class="block font-label-caps text-label-caps uppercase text-fg-tertiary mb-1">PNR (booking ref)</label>
<input class="w-full bg-transparent border-none p-0 font-h3 text-[1.25rem] text-fg-primary focus:ring-0" type="text" value="XP92LW"/>
</div>
<div class="group border-b border-border-default pb-space-2 transition-colors focus-within:border-border-strong">
<label class="block font-label-caps text-label-caps uppercase text-fg-tertiary mb-1">Flight Number</label>
<input class="w-full bg-transparent border-none p-0 font-h3 text-[1.25rem] text-fg-primary focus:ring-0" type="text" value="BA0175"/>
</div>
</div>
<div class="grid grid-cols-2 gap-space-5">
<div class="group border-b border-border-default pb-space-2 transition-colors focus-within:border-border-strong">
<label class="block font-label-caps text-label-caps uppercase text-fg-tertiary mb-1">From (IATA)</label>
<input class="w-full bg-transparent border-none p-0 font-h3 text-[1.25rem] text-fg-primary focus:ring-0" type="text" value="LHR"/>
</div>
<div class="group border-b border-border-default pb-space-2 transition-colors focus-within:border-border-strong">
<label class="block font-label-caps text-label-caps uppercase text-fg-tertiary mb-1">To (IATA)</label>
<input class="w-full bg-transparent border-none p-0 font-h3 text-[1.25rem] text-fg-primary focus:ring-0" type="text" value="JFK"/>
</div>
</div>
<div class="group border-b border-border-default pb-space-2 transition-colors focus-within:border-border-strong">
<label class="block font-label-caps text-label-caps uppercase text-fg-tertiary mb-1">Departure Date</label>
<input class="w-full bg-transparent border-none p-0 font-h3 text-[1.25rem] text-fg-primary focus:ring-0" type="text" value="24 OCT 2024"/>
</div>
</div>
<!-- Live Preview Section -->
<div class="col-span-1 md:col-span-2 pt-space-6">
<h2 class="font-label-caps text-label-caps uppercase text-fg-tertiary mb-space-4">Live Preview</h2>
<div class="flex justify-center bg-surface-container p-space-6 rounded-xl border border-border-subtle relative overflow-hidden">
<!-- Background Prompt Image Layer -->
<div class="absolute inset-0 opacity-5 mix-blend-overlay">
<img class="w-full h-full object-cover" data-alt="A macro close-up of a high-tech thermal receipt printer mechanism with sleek black metallic components and subtle industrial lighting. The atmosphere is professional and precise, mirroring a modern aviation or logistics environment. Minimalist black and white tones dominate the frame with sharp focus on the printing edge, creating a sense of reliability and high-speed efficiency." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7oDp5bZWk6dnRk7ISDkpDH10fY51GRqtnys82kNFKpzFymQ07cTB1U-JfA0yY9zhyIEuJktYHOdYIb4IsasAmX7--aOoxsFH77NXOSZ8DevolgjiKtNBRv0Wytlotduv_6VSvUKXFrF4UwlB9obvGhGwseJTYUBwxQlb8jx6Ttv6JNoWwYZJjjvRoWZBKnKXY9vlXM4CNS2ymjGjBehTOcS2DK9Rczfn0a_gxNe6bcO1h0eWAisBufaOE5es6YWU5VR1KnM2h7jE"/>
</div>
<!-- Thermal Pass Snippet -->
<div class="w-64 bg-white shadow-xl p-space-4 border-l-4 border-black relative overflow-hidden flex flex-col gap-space-2">
<div class="absolute top-0 right-0 w-12 h-12 thermal-dot-pattern"></div>
<div class="border-b border-dashed border-fg-tertiary pb-space-2">
<p class="font-wordmark text-[1.2rem] leading-none">Pass Printer</p>
</div>
<div class="space-y-1">
<p class="text-[0.6rem] font-bold uppercase tracking-widest text-fg-tertiary">Passenger</p>
<p class="font-code text-[0.8rem] font-bold">VANDEROHE / ALEXANDER</p>
</div>
<div class="flex justify-between">
<div>
<p class="text-[0.6rem] font-bold uppercase tracking-widest text-fg-tertiary">From</p>
<p class="font-h3 text-[1.5rem] leading-none">LHR</p>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-[1rem]">flight_takeoff</span>
</div>
<div class="text-right">
<p class="text-[0.6rem] font-bold uppercase tracking-widest text-fg-tertiary">To</p>
<p class="font-h3 text-[1.5rem] leading-none">JFK</p>
</div>
</div>
<div class="pt-space-2 flex justify-center">
<span class="material-symbols-outlined text-[3rem]">barcode_scanner</span>
</div>
<p class="text-[0.5rem] font-code text-center text-fg-tertiary mt-1">XP92LW // 24OCT24 // BA0175</p>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar / Navigation -->
<div class="fixed bottom-0 left-0 w-full z-50">
<div class="bg-bg-primary px-space-4 py-space-4 border-t border-border-subtle flex flex-col gap-space-3 shadow-xl">
<button class="w-full bg-interactive-bg text-fg-inverse py-space-4 font-label-caps text-label-caps uppercase tracking-widest hover:bg-interactive-bg-hover transition-colors">
                Next to Preview
            </button>
</div>
<!-- Shared BottomNavBar component logic -->
<nav class="bg-bg-primary flex justify-around items-center h-20 pb-safe px-space-6 border-t border-border-subtle">
<div class="flex flex-col items-center justify-center text-fg-tertiary pt-1">
<span class="material-symbols-outlined">home</span>
<span class="font-label-caps text-[0.65rem] uppercase tracking-widest">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-fg-primary font-bold border-t-2 border-border-strong pt-1">
<span class="material-symbols-outlined">barcode_scanner</span>
<span class="font-label-caps text-[0.65rem] uppercase tracking-widest">Capture</span>
</div>
<div class="flex flex-col items-center justify-center text-fg-tertiary pt-1">
<span class="material-symbols-outlined">history</span>
<span class="font-label-caps text-[0.65rem] uppercase tracking-widest">Archive</span>
</div>
</nav>
</div>
</body></html>
