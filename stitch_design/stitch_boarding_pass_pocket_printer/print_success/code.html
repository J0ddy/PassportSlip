<!DOCTYPE html>

<html class="light" lang="en"><head>

        theme: {
          extend: {
            "colors": {
                    "interactive-bg": "#000000",
                    "on-secondary": "#ffffff",
                    "secondary-fixed-dim": "#c7c6c6",
                    "primary": "#000000",
                    "inverse-primary": "#c6c6c6",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#e8e8e8",
                    "secondary-fixed": "#e4e2e2",

                    "outline-variant": "#cfc4c5",

                    "on-error": "#ffffff",
                    "surface-container-highest": "#e2e2e2",
                    "surface-tint": "#5e5e5e",
                    "on-primary-fixed": "#1b1b1b",
                    "primary-fixed": "#e2e2e2",
                    "bg-tertiary": "#F0F0F0",
                    "interactive-bg-press": "#444444",
                    "error": "#ba1a1a",
                    "border-strong": "#000000",
                    "on-tertiary-fixed-variant": "#474747",
                    "bg-inverse-subtle": "#111111",
                    "border-default": "#767676", // Darkened for better visibility
                    "inverse-on-surface": "#f1f1f1",
                    "surface-container-low": "#f3f3f3",
                    "background": "#f9f9f9",
                    "on-surface": "#1b1b1b",
                    "on-error-container": "#93000a",
                    "outline": "#767676",
                    "fg-tertiary": "#444444", // Significantly increased for WCAG AAA (from #AAAAAA)
                    "surface-container": "#eeeeee",
                    "fg-primary": "#000000",
                    "tertiary-fixed-dim": "#c6c6c6",
                    "fg-inverse": "#FFFFFF",
                    "secondary-container": "#e1dfdf",
                    "on-surface-variant": "#4c4546",
                    "on-background": "#1b1b1b",
                    "primary-fixed-dim": "#c6c6c6",
                    "bg-primary": "#FFFFFF",
                    "interactive-bg-hover": "#222222",

                    "surface-variant": "#e2e2e2",
                    "on-secondary-fixed": "#1b1c1c",
                    "tertiary-container": "#1b1b1b",
                    "on-primary": "#ffffff",
                    "on-tertiary-container": "#444444", // Increased for WCAG AAA
                    "surface-container-lowest": "#ffffff",

                    "surface": "#f9f9f9",
                    "surface-dim": "#dadada",
                    "fg-disabled": "#767676",
                    "bg-secondary": "#F8F8F8",
                    "tertiary-fixed": "#e2e2e2",
                    "surface-bright": "#f9f9f9",

                    "on-secondary-fixed-variant": "#464747"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",

                    "space-1": "4px",
                    "space-2": "8px",
                    "base": "8px",
                    "space-8": "64px",
                    "space-4": "16px",
                    "container-margin": "32px",
                    "gutter": "24px",
                    "space-7": "48px",
                    "space-5": "24px"
            },
            "fontFamily": {
                    "body-base": ["manrope"],
                    "code": ["DM Mono"],
                    "wordmark": ["DM Sans"],
                    "label-caps": ["manrope"],
                    "h3": ["manrope"],
                    "h1": ["DM Sans"],
                    "lead": ["manrope"],
                    "h2": ["manrope"]
            },
            "fontSize": {

        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-fg-primary min-h-screen flex flex-col font-body-base">
<!-- TopAppBar -->
<header class="bg-bg-primary dark:bg-bg-inverse text-fg-primary dark:text-fg-inverse font-h3 text-h3 tracking-tight uppercase docked full-width top-0 border-b-2 border-border-strong flat no shadows flex justify-between items-center w-full px-space-4 h-20 sticky z-50">
<div class="flex items-center gap-space-3">
<span class="material-symbols-outlined !text-[32px]">menu</span>
<span class="font-wordmark text-wordmark text-fg-primary dark:text-fg-inverse uppercase tracking-tight">PASS PRINTER</span>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined !text-[32px]">print_connect</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start px-container-margin py-space-8">
<!-- Progress State -->
<section class="w-full max-w-2xl flex flex-col items-center text-center space-y-space-6">
<div class="w-full space-y-space-3">
<div class="flex justify-between items-end mb-space-2">
<h2 class="font-h2 text-h2 text-fg-primary tracking-tight">PRINTING...</h2>
<span class="font-code text-code text-fg-primary font-bold">74%</span>
</div>
<!-- Progress Bar -->
<div class="w-full h-3 bg-surface-container overflow-hidden">
<div class="h-full bg-interactive-bg w-[74%] transition-all duration-500"></div>
</div>
</div>
<!-- Bento Layout for Success Message & Actions -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter w-full mt-space-8">
<!-- Success Header & Icon Card -->
<div class="md:col-span-8 bg-bg-primary shadow-lg p-space-6 flex flex-col justify-between min-h-[350px] border border-border-subtle">
<div class="flex justify-between items-start">
<h1 class="font-h1 text-h1 text-fg-primary uppercase leading-none font-bold">SUCCESS</h1>
<span class="material-symbols-outlined text-fg-primary !text-[64px]" style="font-variation-settings: 'wght' 400;">check_circle</span>
</div>
<div class="space-y-space-5">
<p class="font-lead text-lead text-fg-primary max-w-md text-left">Your secure identification pass has been generated and transmitted to the hardware queue successfully.</p>
<div class="flex flex-wrap gap-space-3">
<span class="bg-bg-tertiary px-space-3 py-space-2 font-label-caps text-label-caps uppercase text-fg-primary border border-border-default">Queue ID: #88219</span>
<span class="bg-bg-tertiary px-space-3 py-space-2 font-label-caps text-label-caps uppercase text-fg-primary border border-border-default">Status: Verified</span>
</div>
</div>
</div>
<!-- Primary Action Card (Return Home) -->
<div class="md:col-span-4 bg-interactive-bg p-space-6 flex flex-col justify-between text-on-primary">
<div class="space-y-space-3">
<span class="font-label-caps text-label-caps uppercase text-fg-inverse opacity-80">Next Task</span>
<h3 class="font-h3 text-h3 leading-tight font-bold">Return Home</h3>
</div>
<button class="w-full bg-fg-inverse text-interactive-bg py-space-4 font-label-caps text-label-caps uppercase hover:bg-secondary-fixed transition-colors flex items-center justify-center gap-space-2 font-bold text-lg">
                    Dashboard
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Secondary Options Card -->
<div class="md:col-span-12 grid grid-cols-1 md:grid-cols-2 gap-gutter">
<button class="border-2 border-border-strong hover:bg-bg-secondary p-space-6 flex items-center justify-between group transition-colors">
<div class="flex items-center gap-space-4">
<span class="material-symbols-outlined text-fg-primary !text-[32px]">content_copy</span>
<span class="font-bold text-xl uppercase tracking-widest">Print Again</span>
</div>
<span class="material-symbols-outlined !text-[32px]">chevron_right</span>
</button>
<button class="border-2 border-border-strong hover:bg-bg-secondary p-space-6 flex items-center justify-between group transition-colors">
<div class="flex items-center gap-space-4">
<span class="material-symbols-outlined text-fg-primary !text-[32px]">edit_note</span>
<span class="font-bold text-xl uppercase tracking-widest">Edit Pass</span>
</div>
<span class="material-symbols-outlined !text-[32px]">chevron_right</span>
</button>
</div>
<!-- Aesthetic Visual Anchor -->
<div class="md:col-span-12 h-64 relative overflow-hidden bg-bg-secondary border border-border-default">
<img alt="Printing Success" class="absolute inset-0 w-full h-full object-cover grayscale mix-blend-multiply opacity-25" data-alt="A macro cinematic shot of a high-end industrial thermal printer head moving across a clean white surface in a minimalist laboratory setting. The lighting is cold, clinical, and high-contrast, casting sharp shadows that define the geometric precision of the machine. The overall aesthetic is monochromatic, emphasizing professional reliability and technical sophistication in a modern light-mode environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvvq6F8DOJPHb1rxtOAMLqhNBfOGCKRP7-Wjj3Lns6alr9vqSSMczmN7biVCceyW19SvieUip-_3BrRkz8lPtyVSRIA3RwIK2FR7EK-SkNtaPRvJ_pub2sCy9PCHTidHYNCaE5eocqU1cvVtaGXpStCbpqyrj9zV5Lb0zMdGn3Iu3--uoRKxBKppOFzjALRaeWyYQvxJRJUMV4XLO9MJ1fcE0HiCsVxiZQ6X7GnZ-7oQ_PqqNK1ny6_jf0xSwgNvkFCfoX0-g8B1w"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-bg-primary/95 backdrop-blur-sm p-space-6 border-2 border-border-strong max-w-sm">
<p class="font-code text-code text-fg-primary text-center uppercase tracking-tighter font-bold">
                            Transmission Protocol: Encrypted <br/> Buffer Status: Cleared
                        </p>
</div>
</div>
</div>
</div>
</section>
</main>
</body></html>
